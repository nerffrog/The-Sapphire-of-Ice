                    equals=0
                [/variable]
                [then]
                    [store_unit]
                        [filter]
                            side=1
                            [not]
                                id=$unit.id
                            [/not]
                            [filter_adjacent]
                                id=arcanister
                                adjacent=$trigger_dir
                            [/filter_adjacent]
                        [/filter]
                        variable=surprise_ally
                    [/store_unit]
                    [message]
                        speaker=arcanister
                        message= _ "A trap?!"
                    [/message]
                    [animate_unit]
                        flag=attack
                        [filter]
                            id=$surprise_ally.id
                        [/filter]
                        [primary_attack]
                            range=melee
                        [/primary_attack]
                        [facing]
                            x,y=$x2,$y2
                        [/facing]
                        hits=yes
                    [/animate_unit]
                    [floating_text]
                        x,y=$x2,$y2
                        text="<span color='#ff0000' size='large' weight='bold'>" + _ "CRITICAL HIT!" + "</span>"
                    [/floating_text]
                    [message]
                        speaker=arcanister
                        message= _ "ACK!"
                    [/message]
                    [message]
                        speaker=sapphire
                        message= _ "He has fainted but will regain consciousness very shortly. Quickly Krix, take his staff!"
                    [/message]
                    [set_variable]
                        name=drop_x
                        value=$second_unit.x
                    [/set_variable]
                    [set_variable]
                        name=drop_y
                        value=$second_unit.y
                    [/set_variable]
                    [store_unit]
                        [filter]
                            id=arcanister
                        [/filter]
                        variable=stored_arcanister
                        kill=yes
                        fire_event=no
                    [/store_unit]
                    [item]
                        x,y=$drop_x,$drop_y
                        image=items/staff.png
                    [/item]
                    [set_variable]
                        name=wakeup_turn
                        value=$turn_number
                    [/set_variable]
                    [set_variable]
                        name=wakeup_turn
                        add=1
                    [/set_variable]
                    {CLEAR_VARIABLE surprise_ally}
                    [set_variable]
                        name=trigger_dir
                        value=$empty
                    [/set_variable]
                    [objectives]
                        [objective]
                            description= _ "Steal the staff with Krix"
                            condition="win"
                        [/objective]
                        [objective]
                            description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
                            condition="lose"
                        [/objective]
                        [objective]
                            description= _ "Turns run out"
                            condition="lose"
                        [/objective]
                        [gold_carryover]
                            bonus=no
                            carryover_percentage=40
                        [/gold_carryover]
                    [/objectives]
                [/then]
            [/if]
            {CLEAR_VARIABLE trigger_dir}
        [/event]
        [event]
            name=moveto
            first_time_only=no
            [filter]
                x,y=$drop_x,$drop_y
            [/filter]
            [if]
                [variable]
                    name=unit.id
                    equals=krix
                [/variable]
                [then]
                    [remove_item]
                        x,y=$x1,$y1
                        image=items/staff.png
                    [/remove_item]
                    [object]
                        id=the_gray_touch
                        name= _ "The Gray Touch"
                        image=items/staff.png
                        duration=forever
                        description= _ "A magical staff that turns living creatures into solid stone."
                        [effect]
                            apply_to=attack
                            range=melee
                            set_description= _ "the gray touch"
                            increase_damage=2
                        [/effect]
                        [effect]
                            apply_to=attack
                            range=ranged
                            [set_specials]
                                mode=append
                                {WEAPON_SPECIAL_PETRIFY}
                            [/set_specials]
                        [/effect]
                    [/object]
                    [message]
                        speaker=krix
                        message= _ "I have the staff!"
                    [/message]
                    [message]
                        speaker=sapphire
                        message= _ "Prepare to strike him with it."
                    [/message]
                    [set_variable]
                        name=staff_stolen
                        value=yes
                    [/set_variable]
                    [set_variable]
                        name=drop_x
                        value=0
                    [/set_variable]
                [/then]
                [else]
                    [message]
                        speaker=unit
                        message= _ "This staff radiates dark energy... I should leave it for Krix."
                    [/message]
                [/else]
            [/if]
        [/event]
        [event]
            name=new turn
            first_time_only=no
            [if]
                [variable]
                    name=turn_number
                    equals=$wakeup_turn
                [/variable]
                [then]
                    [unstore_unit]
                        variable=stored_arcanister
                        find_vacant=yes
                        check_passability=yes
                    [/unstore_unit]
                    {CLEAR_VARIABLE stored_arcanister}
                    [if]
                        [variable]
                            name=staff_stolen
                            equals=yes
                        [/variable]
                        [then]
                            [message]
                                speaker=arcanister
                                message= _ "THIEVES! My work! The great hardening was nearly complete! You will crumble for this!"
                            [/message]
                            [message]
                                speaker=sapphire
                                message= _ "Turn him to stone Krix!"
                            [/message]
                            [objectives]
                                [objective]
                                    description= _ "Petrify the arcanister"
                                    condition="win"
                                [/objective]
                                [objective]
                                    description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
                                    condition="lose"
                                [/objective]
                                [objective]
                                    description= _ "Turns run out"
                                    condition="lose"
                                [/objective]
                                [gold_carryover]
                                    bonus=no
                                    carryover_percentage=40
                                [/gold_carryover]
                            [/objectives]
                        [/then]
                        [else]
                            [remove_item]
                                x,y=$drop_x,$drop_y
                                image=items/staff.png
                            [/remove_item]
                            [message]
                                speaker=arcanister
                                message= _ "I WILL DESTROY YOU ALL!"
                            [/message]
                            [message]
                                speaker=sapphire
                                message= _ "We must take that staff! Knock him out again!"
                            [/message]
                            [objectives]
                                [objective]
                                    description= _ "Attack the arcanister in melee, with Grug on the opposite side"
                                    condition="win"
                                [/objective]
                                [objective]
                                    description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
                                    condition="lose"
                                [/objective]
                                [objective]
                                    description= _ "Turns run out"
                                    condition="lose"
                                [/objective]
                                [gold_carryover]
                                    bonus=no
                                    carryover_percentage=40
                                [/gold_carryover]
                            [/objectives]
                            [set_variable]
                                name=drop_x
                                value=0
                            [/set_variable]
                        [/else]
                    [/if]
                    {CLEAR_VARIABLE wakeup_turn}
                [/then]
            [/if]
        [/event]
    [/event]
    [event]
        name=attacker hits
        first_time_only=no
        [filter_attack]
            special_type=petrifies
        [/filter_attack]
        [filter_second]
            type="Fire Guardian","Fire Wraith"
        [/filter_second]
        [set_variable]
            name=petrified_spirits
            add=1
        [/set_variable]
        {ADVANCE_UNIT (id=$second_unit.id) "Troll Whelp"}
        [if]
            [variable]
                name=petrified_spirits
                equals=1
            [/variable]
            [then]
                [message]
                    speaker=friendly_troll
                    message= _ "Have mercy! They are not ready!"
                [/message]
                [harm_unit]
                    [filter]
                        id=$second_unit.id
                    [/filter]
                    amount=999
                    animate=yes
                    kill=yes
                    fire_event=yes
                [/harm_unit]
                [message]
                    speaker=krix
                    message= _ "I am sorry, I had to do it."
                [/message]
            [/then]
            [else]
                [harm_unit]
                    [filter]
                        id=$second_unit.id
                    [/filter]
                    amount=999
                    animate=yes
                    kill=yes
                    fire_event=yes
                [/harm_unit]
            [/else]
        [/if]
    [/event]
    [event]
        name=attacker hits
        [filter_attack]
            special_type=petrifies
        [/filter_attack]
        [filter_second]
            id=arcanister
        [/filter_second]
        [message]
            speaker=arcanister
            message= _ "..."
        [/message]
        [message]
            speaker=krix
            message= _ "You shall not disturb us anymore."
        [/message]
        {QUAKE "rumble.ogg"}
        {QUAKE "rumble.ogg"}
        [terrain]
            terrain=Qlf
            [and]
                terrain=Ql
            [/and]
        [/terrain]
        [message]
            speaker=sapphire
            message= _ "The lava is rising! We must escape immediately!"
        [/message]
        [set_variable]
            name=new_limit
            value=$turn_number
        [/set_variable]
        [set_variable]
            name=new_limit
            add=13
        [/set_variable]
        [set_variable]
            name=lower_lava
            value=26
        [/set_variable]
        [modify_turns]
            value=$new_limit
        [/modify_turns]
        {CLEAR_VARIABLE new_limit}
        [objectives]
            [objective]
                description= _ "Move Kryz'tara to the eastern border"
                condition="win"
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
                condition="lose"
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition="lose"
            [/objective]
            [gold_carryover]
                bonus=no
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
        [event]
            name=new turn
            first_time_only=no
            {QUAKE "rumble.ogg"}
            {QUAKE "rumble.ogg"}
            {GENERIC_UNIT 2 "Fire Guardian" 22 1}
#ifndef HARD
            {GENERIC_UNIT 2 "Fire Guardian" 12 25}
#endif
#ifdef HARD
            {GENERIC_UNIT 2 "Fire Wraith" 12 25}
#endif
            {GENERIC_UNIT 2 "Fire Guardian" 24 25}
            [set_variable]
                name=lava_turn
                add=1
            [/set_variable]
            [set_variable]
                name=lower_lava
                sub=1
            [/set_variable]
            [terrain]
                terrain=Qlf
                x=1-36
                y="0-$lava_turn"
                replace_if_failed=yes
            [/terrain]
            [terrain]
                terrain=Qlf
                x=1-36
                y="$lower_lava-26"
                replace_if_failed=yes
            [/terrain]
            [store_unit]
                [filter]
                    [filter_location]
                        terrain=Qlf,Ql
                    [/filter_location]
                [/filter]
                variable=burning_store
                kill=no
            [/store_unit]
            [foreach]
                array=burning_store
                [do]
                    [if]
                        [variable]
                            name=this_item.movement_costs.unwalkable
                            equals=1
                        [/variable]
                        [else]
                            [harm_unit]
                                [filter]
                                    id=$this_item.id
                                [/filter]
                                amount=999
                                animate=yes
                                kill=yes
                                fire_event=yes
                            [/harm_unit]
                        [/else]
                    [/if]
                [/do]
            [/foreach]
            {CLEAR_VARIABLE burning_store}
        [/event]
        [event]
            name=moveto
            [filter]
                id=sapphire
                x,y=46-47,1-26
            [/filter]
            [message]
                speaker=sapphire
                message= _ "That was close."
            [/message]
            {CLEAR_VARIABLE trolls_petrified}
            {CLEAR_VARIABLE trolls_killed}
            {CLEAR_VARIABLE drop_x}
            {CLEAR_VARIABLE drop_y}
            {CLEAR_VARIABLE staff_stolen}
            {CLEAR_VARIABLE hits_required}
            {CLEAR_VARIABLE lava_turn}
            {CLEAR_VARIABLE lower_lava}
            {CLEAR_VARIABLE petrified_spirits}
            [endlevel]
                result=victory
                carryover_percentage=40
                carryover_add=yes
                bonus=no
            [/endlevel]
        [/event]
    [/event]
    [event]
        name=last breath
        first_time_only=no
        [filter]
            id=arcanister
        [/filter]
        [message]
            speaker=unit
            message= _ "Fools! You think you can kill me?!"
        [/message]
        [animate_unit]
            flag=heal
            [filter]
                id=arcanister
            [/filter]
        [/animate_unit]
        [modify_unit]
            [filter]
                id=arcanister
            [/filter]
            hitpoints=$unit.max_hitpoints
        [/modify_unit]
        [floating_text]
            x,y=$x1,$y1
            text="<span color='#00ff00'>" + _ "RESTORED" + "</span>"
        [/floating_text]
        [message]
            speaker=unit
            message= _ "HAHAHA!"
        [/message]
    [/event]
    [event]
        name=last breath
        [filter]
            id=sapphire
        [/filter]
        [message]
            speaker=unit
            message= _ "I finally embrace the cold of death."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
    [event]
        name=last breath
        [filter]
            id=krix,vash,friendly_troll
        [/filter]
        [message]
            speaker=unit
            message= _ "How shall my friends escape without me?"
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
    [event]
        name=die
        first_time_only=no
        [filter]
            side=1
            type="Troll Whelp","Troll","Troll Warrior"
        [/filter]
        [set_variable]
            name=trolls_killed
            add=1
        [/set_variable]
        [if]
            [variable]
                name=trolls_killed
                equals=5
            [/variable]
            [then]
                [message]
                    speaker=sapphire
                    message= _ "We lost too many trolls!"
                [/message]
                [endlevel]
                    result=defeat
                [/endlevel]
            [/then]
        [/if]
    [/event]
    [event]
        name=time over
        [message]
            speaker=sapphire
            message= _ "We could not make it in time. This is hopeless."
        [/message]
        [terrain]
            terrain=Qlf
        [/terrain]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
[/scenario]
