#textdomain wesnoth-The_Sapphire_of_Ice
[scenario]
    id=06_Lava_Lake
    next_scenario=07_Stone_Cold
    name= _ "Lava Lake"
    map_data="{~add-ons/The_Sapphire_of_Ice/maps/06_Lava_Lake.map}"
    {UNDERGROUND}
    turns=45
    victory_when_enemies_defeated=no
    [side]
        side=1
        controller=human
        team_name="good"
        user_team_name= _ "Drakes"
        id=sapphire
        name= _ "Kryz'tara"
        type="Glacial Drake"
        unrenameable=yes
        canrecruit=yes
        gold=200
        income=12
        recruit="Saurian Skirmisher, Saurian Augur, Drake Glider, Troll Whelp"
        shroud=yes
    [/side]
    [side]
        side=2
        controller=ai
        team_name="bad"
        user_team_name= _ "Elementals"
        no_leader=yes
        gold=0
        hidden=yes
        [ai]
            aggression=0.99
            caution=0.0
            grouping=no
        [/ai]
    [/side]
    [event]
        name=prestart
        [unit]
            type="Dwarvish Arcanister"
            id=arcanister
            side=2
            x,y=11,14
            random_traits=no
        [/unit]
        [modify_unit]
            [filter]
                id=arcanister
            [/filter]
            [resistance]
                blade=0
                pierce=0
                impact=0
                fire=0
                cold=0
                arcane=0
            [/resistance]
            max_moves=2
        [/modify_unit]
        [petrify]
            id=arcanister
        [/petrify]
        [recall]
            id=krix
        [/recall]
        [recall]
            id=vash
        [/recall]
        [recall]
            id=friendly_troll
        [/recall]
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Troll Whelp" 44 14}
        {GENERIC_UNIT 1 "Drake Glider" 44 14}
#ifdef EASY
        {GENERIC_UNIT 1 "Drake Glider" 44 14}
#endif
        {GENERIC_UNIT 1 "Sky Drake" 44 14}
        [unit]
            type="Saurian Ambusher"
            side=1
            x,y=44,14
            [modifications]
                {TRAIT_QUICK}
            [/modifications]
        [/unit]
        [unit]
            type="Saurian Soothsayer"
            side=1
            x,y=44,14
            [modifications]
                {TRAIT_QUICK}
            [/modifications]
        [/unit]
        [unit]
            type="Saurian Soothsayer"
            side=1
            x,y=44,14
            [modifications]
                {TRAIT_QUICK}
            [/modifications]
        [/unit]
        {PLACE_IMAGE "scenery/rune5.png" 9 13}
        {PLACE_IMAGE "scenery/rune5.png" 13 13}
        {PLACE_IMAGE "scenery/rune5.png" 9 15}
        {PLACE_IMAGE "scenery/rune5.png" 13 15}
        [set_variable]
            name=trolls_petrified
            value=no
        [/set_variable]
        [set_variable]
            name=hits_required
            {QUANTITY value 8 9 10}
        [/set_variable]
    [/event]
    [event]
        name=start
        [message]
            speaker=sapphire
            message= _ "This is the lake the trolls told us about."
        [/message]
        [message]
            speaker=krix
            message= _ "We have to explore it. Unlike you, trolls and saurians can't fly. What shall we do?"
        [/message]
        [if]
            [have_unit]
                type="Glacial Drake","Frost Drake"
            [/have_unit]
            [then]
                [message]
                    speaker=sapphire
                    message= _ "I can feel my freezing powers grow as we speak. Perhaps, if I get powerful enough, I should be able to freeze the lava for you to cross."
                [/message]
                [message]
                    speaker=krix
                    message= _ "But we are completely surrounded by lava! Can you even muster sufficient energy for this?"
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "I will have to try."
                [/message]
                [message]
                    speaker=narrator
                    image="wesnoth-icon.png"
                    message= _ "Advance Kryz'tara to level 3 to proceed further."
                [/message]
                [modify_turns]
                    value=58
                [/modify_turns]
                [event]
                    name=post advance
                    [filter]
                        type="Blizzard Drake"
                    [/filter]
                    [message]
                        speaker=sapphire
                        message= _ "I can carve out a path in the lava with my cold presence."
                    [/message]
                    [message]
                        speaker=sapphire
                        message= _ "The ice is very sturdy, we will proceed slowly to give you time to catch up."
                    [/message]
                    [message]
                        speaker=vash
                        message= _ "We will flank you from the sides. No friend of mine dies today."
                    [/message]
                [/event]
            [/then]
            [else]
                [message]
                    speaker=sapphire
                    message= _ "I can carve out a path in the lava with my cold presence."
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "The ice is very sturdy, we will proceed slowly to give you time to catch up."
                [/message]
                [message]
                    speaker=vash
                    message= _ "We will flank you from the sides. No friend of mine dies today."
                [/message]
            [/else]
        [/if]
        [objectives]
            [objective]
                description= _ "Explore the lake"
                condition="win"
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
                condition="lose"
            [/objective]
            [objective]
                description= _ "Death of five trolls"
                condition="lose"
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition="lose"
            [/objective]
            [gold_carryover]
                bonus=no
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]
    [event]
        name=new turn
        first_time_only=no
        [set_variable]
            name=turn_remainder
            value=$turn_number
        [/set_variable]
        [set_variable]
            name=turn_remainder
            modulo=3
        [/set_variable]
        [if]
            [variable]
                name=turn_remainder
                equals=1
            [/variable]
            [then]
#ifndef EASY
                {GENERIC_UNIT 2 "Fire Wraith" 5 14}
#endif
#ifdef HARD
                {GENERIC_UNIT 2 "Fire Guardian" 5 14}
#endif
            [/then]
            [else]
                {GENERIC_UNIT 2 "Fire Guardian" 5 14}
            [/else]
        [/if]
        {CLEAR_VARIABLE turn_remainder}
    [/event]
    [event]
        name=moveto
        [filter]
            side=1
        [/filter]
        {QUAKE "rumble.ogg"}
        [message]
            speaker=vash
            message= _ "You heard that? The ground is rumbling beneath our feet."
        [/message]
        [message]
            speaker=sapphire
            message= _ "We have awoken some spirits. Careful, they might be hostile."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "We are capable of dealing with them. You can take cover in us."
        [/message]
        {GENERIC_UNIT 2 "Fire Guardian" 31 10}
        {GENERIC_UNIT 2 "Fire Guardian" 27 19}
#ifdef MEDIUM
        {GENERIC_UNIT 2 "Fire Guardian" 27 14}
#endif
#ifdef HARD
        {GENERIC_UNIT 2 "Fire Wraith" 27 14}
#endif
    [/event]
    [event]
        name=sighted
        [filter]
            id=arcanister
        [/filter]
        [message]
            speaker=second_unit
            message= _ "Look!"
        [/message]
        [modify_side]
            side=1
            shroud=no
        [/modify_side]
        {SCROLL_TO 11 14}
        [message]
            speaker=vash
            message= _ "Is that... A dwarven statue?"
        [/message]
        [message]
            speaker=krix
            message= _ "The staff he's holding is radiating energy. The statue is alive."
        [/message]
        [message]
            speaker=vash
            message= _ "But he's completely made of stone!"
        [/message]
        [message]
            speaker=sapphire
            message= _ "Bizarre indeed. Look at the glowing glyphs around him. Something unnatural is ongoing here."
        [/message]
        [message]
            speaker=krix
            message= _ "...or rather natural. That dwarf is holding a petrifying staff. Shamans described this place as a source of life for trolls, why do you think so?"
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "..."
        [/message]
        [message]
            speaker=krix
            message= _ "Don't play dumb, Grug. You know exactly what this is. Those fire spirits are nothing but trolls, about to be petrified into their final forms."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "..."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Why did you not tell us?"
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "This is where trolls are born. They shift through walls until they reach other trolls. Trolls think they come from stone. They break walls to find kin. They never think... maybe we come from fire."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "The shamans kept the secret well. The risk of the lake getting attacked outweighed any possible benefit of sharing the story with the tribe."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "My father, reluctant at first, decided to guide you here, but only after you showed him a great deal of courage and selflessness."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "I remained reluctant, but it is too late now."
        [/message]
        [message]
            speaker=vash
            message= _ "We are very sorry for disturbing you, Grug."
        [/message]
        [message]
            speaker=krix
            message= _ "Indeed, but we came with a goal in mind. I believe I know how to achieve it now."
        [/message]
        [message]
            speaker=krix
            message= _ "We shall claim the staff, petrify Kryz, dip him in the lava, allow the fire to seep through his veins, and then revive him."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Dip me in... lava? Are you crazy? Perhaps remaining an icy beast is my best option."
        [/message]
        [message]
            speaker=krix
            message= _ "Let's take this one step at a time. Start by unpetrifying the statue."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "We can drain the stone element from it. A troll on each glyph should do the trick."
        [/message]
        [objectives]
            [objective]
                description= _ "Move a troll onto each glyph"
                condition="win"
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
