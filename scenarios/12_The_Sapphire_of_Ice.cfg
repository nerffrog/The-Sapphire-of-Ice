#textdomain wesnoth-The_Sapphire_of_Ice
[scenario]
    id=12_The_Sapphire_of_Ice
    next_scenario=13_Epilogue
    name= _ "The Sapphire of Ice"
    map_data="{~add-ons/The_Sapphire_of_Ice/maps/12_The_Sapphire_of_Ice.map}"
    {DEFAULT_SCHEDULE}
    turns=-1
    victory_when_enemies_defeated=no
    [side]
        side=1
        controller=human
        team_name="good"
        user_team_name= _ "Kryz'tara"
        id=sapphire
        name= _ "Kryz'tara"
        type="Fimbulwinter Drake"
        unrenameable=yes
        canrecruit=yes
        recruit="Saurian Skirmisher, Saurian Augur, Troll Whelp"
        gold=420
        income=18
    [/side]
    [side]
        side=2
        controller=ai
        team_name="bad"
        user_team_name= _ "Wesmere"
        id=elvish_leader1
        type="Elvish Captain"
        canrecruit=yes
        recruit="Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman, Wose"
        {GOLD 170 190 210}
        income=12
    [/side]
    [side]
        side=3
        controller=ai
        team_name="bad"
        user_team_name= _ "Wesmere"
        id=elvish_leader2
        type="Elvish Ranger"
        canrecruit=yes
        recruit="Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman, Wose"
        {GOLD 110 130 150}
        income=6
    [/side]
    [side]
        side=4
        controller=ai
        team_name="bad"
        user_team_name= _ "Wesmere"
        id=elvish_leader3
        type="Elvish Captain"
        canrecruit=yes
        recruit="Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman, Wose"
        {GOLD 110 130 150}
        income=6
    [/side]
    [side]
        side=5
        controller=ai
        team_name="bad"
        user_team_name= _ "Wesmere"
        id=elvish_leader4
        type="Elvish Marksman"
        canrecruit=yes
        recruit="Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman, Wose"
        {GOLD 110 130 150}
        income=6
    [/side]
    [side]
        side=6
        controller=ai
        team_name="bad"
        user_team_name= _ "Wesmere"
        id=elvish_leader5
        type="Elvish Marshal"
        canrecruit=yes
        recruit="Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman, Wose"
        {GOLD 330 360 400}
        income=18
    [/side]
    [side]
        side=7
        controller=ai
        team_name="statues"
        user_team_name= _ "Statues"
        noleader=yes
        hidden=yes
    [/side]
    [side]
        side=8
        controller=ai
        team_name="bad"
        user_team_name= _ "spirits"
        noleader=yes
        hidden=yes
        [ai]
            aggression=0.99
            caution=0
            grouping=no
        [/ai]
    [/side]
    {STARTING_VILLAGES 1 5}
    {STARTING_VILLAGES 2 9}
    {STARTING_VILLAGES 3 15}
    {STARTING_VILLAGES 4 12}
    {STARTING_VILLAGES 5 10}
    {STARTING_VILLAGES 6 14}
    [event]
        name=prestart
        [recall]
            id=krix
        [/recall]
        [recall]
            id=friendly_troll
        [/recall]
        {VARIABLE phase 1}
        {CAPTURE_VILLAGES 2 32 4 1}
        {CAPTURE_VILLAGES 5 45 26 6}
        {CAPTURE_VILLAGES 6 26 40 1}
        [set_menu_item]
            id=spawn_ice_spirit_menu
            description= _ "Spawn Ice Spirit"
            image="units/iceghost.png"
            [show_if]
                {VARIABLE_CONDITIONAL phase equals 2}
                [not]
                    [have_unit]
                        x,y=$x1,$y1
                    [/have_unit]
                [/not]
                [have_location]
                    x,y=$x1,$y1
                    [not]
                        terrain=X*
                    [/not]
                [/have_location]
                [have_location]
                    x,y=$x1,$y1
                    [filter_adjacent_location]
                        [filter]
                            id=sapphire
                        [/filter]
                    [/filter_adjacent_location]
                [/have_location]
                [not]
                    [have_unit]
                        type=Ice Spirit
                        count=4-999
                    [/have_unit]
                [/not]
            [/show_if]
            [command]
                [unit]
                    type=Ice Spirit
                    side=1
                    x,y=$x1,$y1
                    animate=yes
                [/unit]
            [/command]
        [/set_menu_item]
    [/event]
    [event]
        name=start
        [message]
            speaker=elvish_leader5
            message= _ "I offer you one final chance. Turn back, leave these lands, and never return."
        [/message]
        [message]
            speaker=sapphire
            message= _ "I am not leaving without what is rightfully mine."
        [/message]
        [message]
            speaker=elvish_leader5
            message= _ "Your threats scare no one. Vash and his kin are under our protection now."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Then you shall burn with them."
        [/message]
        [message]
            speaker=krix
            message= _ "This forest is endless. What's the plan, Cold Heart?"
        [/message]
        [message]
            speaker=sapphire
            message= _ "As always. We freeze them where they stand."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "But the elves are so elusive! How can we fight them between all these trees?"
        [/message]
        [message]
            speaker=sapphire
            message= _ "Do I sense cowardice? We already destroyed their northern front. Their capital will fall next."
        [/message]
        [objectives]
            [objective]
                description= _ "Slay all elves"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara, Krix, or Grug"
                condition=lose
            [/objective]
            [note]
                description= _ "<b>This is the final scenario.</b>"
            [/note]
        [/objectives]
    [/event]
    [event]
        name=turn 3
        [unit]
            side=6
            id=dionli
            name= _ "Lady Dionli"
            type=Elvish Enchantress
            x,y=26,25
            [modifications]
                {TRAIT_LOYAL_HERO}
                {TRAIT_QUICK}
                {TRAIT_INTELLIGENT}
            [/modifications]
        [/unit]
        [object]
            id=dionli_silver_essence
            silent=yes
            duration=forever
            [filter]
                id=dionli
            [/filter]
            [effect]
                apply_to=new_ability
                [abilities]
                    [dummy]
                        id=silver_essence
                        name= _ "silver essence"
                        description= _ "This unit possesses an unnatural affinity with teleportation magic, allowing her to teleport out of danger."
                    [/dummy]
                [/abilities]
            [/effect]
            [effect]
                apply_to=movement_costs
                replace=yes
                [movement_costs]
                    frozen=1
                [/movement_costs]
            [/effect]
        [/object]
        [message]
            speaker=dionli
            message= _ "I have waited a long time for this meeting, Krix."
        [/message]
        [message]
            speaker=sapphire
            message= _ "You shall address me directly, elf."
        [/message]
        [message]
            speaker=krix
            message= _ "That... that is the lady from my vision!"
        [/message]
        [message]
            speaker=sapphire
            message= _ "The sorceress you claimed was guarding the artifact? Are you certain?"
        [/message]
        [message]
            speaker=krix
            message= _ "Without a doubt. She was guarding a sapphire of magic. Even through the illusion, I felt its overwhelming energy."
        [/message]
        [message]
            speaker=dionli
            message= _ "If you truly understood what you saw, you would have turned back at the forest's edge. You are as blind in life as you were in your dreams."
        [/message]
        [message]
            speaker=elvish_leader5
            message= _ "My Lady, the woods are crawling with invaders. We cannot guarantee your safety here!"
        [/message]
        [message]
            speaker=dionli
            message= _ "I am not afraid of the drake and his pet lizard. Entering these forests will be your final blunder, Kryz'tara. Wesmere shall become your tomb!"
        [/message]
        [message]
            speaker=sapphire
            message= _ "Very well. I came for my traitors, but I will gladly pry that gem from your dead body."
        [/message]
        [message]
            speaker=krix
            message= _ "Careful, Cold Heart. She may be concealing her full strength."
        [/message]
        [message]
            speaker=sapphire
            message= _ "A mere sorceress is no match for our power. Strike!"
        [/message]
    [/event]
    [event]
        name=turn 6
        [message]
            speaker=dionli
            message= _ "<i>...Spin the silver threads of the void...</i>"
        [/message]
    [/event]
    [event]
        name=turn 9
        [message]
            speaker=dionli
            message= _ "<i>...Weave a cage of fractured distance...</i>"
        [/message]
    [/event]
    [event]
        name=turn 14
        [message]
            speaker=dionli
            message= _ "<i>...Bind their shadows to the argent web...</i>"
        [/message]
    [/event]
    [event]
        name=turn 18
        [message]
            speaker=dionli
            message= _ "<i>...Tear open the spatial rift!</i>"
        [/message]
        {FADE_TO_BLACK}
        [sound]
            name=lightning.ogg
        [/sound]
        [sound]
            name=lightning.ogg
        [/sound]
        [sound]
            name=lightning.ogg
        [/sound]
        [store_unit]
            variable=stored_all
            [filter]
                [not]
                    id=sapphire,krix,dionli
                [/not]
            [/filter]
            kill=yes
        [/store_unit]
        [terrain_mask]
            x,y=1,1
            mask="{~add-ons/The_Sapphire_of_Ice/maps/masks/wesmere_mask.map}"
        [/terrain_mask]
        [remove_event]
            id=freeze_adjacent
        [/remove_event]
        [object]
            silent=yes
            duration=forever
            [filter]
                id=sapphire
            [/filter]
            [effect]
                apply_to=remove_ability
                [abilities]
                    [freezing_aura]
                        id="freezing aura"
                    [/freezing_aura]
                [/abilities]
            [/effect]
        [/object]
        {TELEPORT_EFFECT_OBJECT_ID sapphire}
        {TELEPORT_EFFECT_OBJECT_ID krix}
        {TELEPORT_EFFECT_OBJECT_ID dionli}
        [teleport]
            [filter]
                id=sapphire
            [/filter]
            x,y=23,27
        [/teleport]
        [teleport]
            [filter]
                id=krix
            [/filter]
            x,y=26,25
        [/teleport]
        [teleport]
            [filter]
                id=dionli
            [/filter]
            x,y=23,24
        [/teleport]
        [modify_side]
            side=1
            shroud=yes
        [/modify_side]
        [modify_side]
            side=2-6
            hidden=yes
        [/modify_side]
        [modify_side]
            side=8
            hidden=no
        [/modify_side]
        [modify_unit]
            [filter]
                id=dionli
            [/filter]
            side=8
        [/modify_unit]
        [delay]
            time=2000
        [/delay]
        [replace_schedule]
            {INDOORS}
        [/replace_schedule]
        [scroll_to]
            x,y=23,25
        [/scroll_to]
        {FADE_IN}
        [redraw]
            clear_shroud=yes
        [/redraw]
        {VARIABLE phase 2}
        {VARIABLE messages_said 0}
        {CLEAR_VARIABLE evasion_seen}
        [message]
            speaker=sapphire
            message= _ "What was that spell? Where are we?"
        [/message]
        [message]
            speaker=dionli
            message= _ "Welcome to my sanctuary. Your march ends here."
        [/message]
        [message]
            speaker=krix
            message= _ "We outnumber her! Cold Heart, this is our chance to claim the powerful gem!"
        [/message]
        [message]
            speaker=sapphire
            message= _ "My powers are fading... as if something is attempting to drain them."
        [/message]
        [message]
            speaker=dionli
            message= _ "This dimension is fully upheld by my arcane magic."
        [/message]
        [message]
            speaker=sapphire
            message= _ "You're but a trickster, far weaker than you appear."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Rise, spirits of ice. Dispell the lady's illusions."
        [/message]
        [sound]
            name=magic-dark.ogg
        [/sound]
        [unit]
            side=1
            type=Ice Spirit
            animate=yes
            x,y=23,26
        [/unit]
        [message]
            speaker=dionli
            message= _ "Impressive."
        [/message]
        [message]
            speaker=krix
            message= _ "You should have thought about that before surrounding yourself with your enemies."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Kill her!"
        [/message]
        [message]
            speaker=narrator
            image="wesnoth-icon.png"
            message= _ "Right-click near Kryz'tara to summon ice spirits. Only 4 may exist at a time."
        [/message]
        [objectives]
            [objective]
                description= _ "Kill Lady Dionli"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara or Krix"
                condition=lose
            [/objective]
            [note]
                description= _ "You may summon ice spirits by right-clicking next to Kryz'tara. Only 4 spirits may exist at a time."
            [/note]
        [/objectives]
    [/event]
    [event]
        name=attacker hits
        first_time_only=no
        [filter_condition]
            {VARIABLE_CONDITIONAL phase equals 1}
        [/filter_condition]
        [filter_second]
            id=dionli
        [/filter_second]
        [heal_unit]
            [filter]
                id=dionli
            [/filter]
            amount=$damage_inflicted
            animate=no
        [/heal_unit]
        [store_map_dimensions]
        [/store_map_dimensions]
        [store_locations]
            x=1-$map_size.width
            y=1-$map_size.height
            [and]
                x,y=$x2,$y2
                radius=6
            [/and]
            [not]
                x,y=$x2,$y2
                radius=2
            [/not]
            variable=valid_teleports
        [/store_locations]
        [set_variable]
            name=rand_index
            rand=0..$($valid_teleports.length - 1)
        [/set_variable]
        {TELEPORT_EFFECT_OBJECT_ID dionli} #duration=turn
        [teleport]
            [filter]
                id=dionli
            [/filter]
            x,y=$valid_teleports[$rand_index].x,$valid_teleports[$rand_index].y
            animate=yes
        [/teleport]
        [if]
            {VARIABLE_CONDITIONAL evasion_seen not_equals yes}
            [then]
                [message]
                    speaker=dionli
                    message= _ "Did you expect me to stand there and take it?"
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "I expected nothing more from a coward like you."
                [/message]
                {VARIABLE evasion_seen yes}
            [/then]
        [/if]
        {CLEAR_VARIABLE map_size,valid_teleports,rand_index}
    [/event]
    [event]
        name=defender hits
        first_time_only=no
        [filter_condition]
            {VARIABLE_CONDITIONAL phase equals 1}
        [/filter_condition]
        [filter]
            id=dionli
        [/filter]
        [heal_unit]
            [filter]
                id=dionli
            [/filter]
            amount=$damage_inflicted
            animate=no
        [/heal_unit]
        [store_map_dimensions]
        [/store_map_dimensions]
        [store_locations]
            x=1-$map_size.width
            y=1-$map_size.height
            [and]
                x,y=$x1,$y1
                radius=6
            [/and]
            [not]
                x,y=$x1,$y1
                radius=2
            [/not]
            variable=valid_teleports
        [/store_locations]
        [set_variable]
            name=rand_index
            rand=0..$($valid_teleports.length - 1)
        [/set_variable]
        {TELEPORT_EFFECT_OBJECT_ID dionli}
        [teleport]
            [filter]
                id=dionli
            [/filter]
            x,y=$valid_teleports[$rand_index].x,$valid_teleports[$rand_index].y
            animate=yes
        [/teleport]
        [if]
            {VARIABLE_CONDITIONAL evasion_seen not_equals yes}
            [then]
                [message]
                    speaker=dionli
                    message= _ "Did you expect me to stand there and take it?"
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "I expected nothing more from a coward like you."
                [/message]
                {VARIABLE evasion_seen yes}
            [/then]
        [/if]
        {CLEAR_VARIABLE map_size,valid_teleports,rand_index}
    [/event]
    [event]
        name=attacker hits
        first_time_only=no
        [filter_condition]
            {VARIABLE_CONDITIONAL phase equals 2}
        [/filter_condition]
        [filter_second]
            id=dionli
        [/filter_second]
        [heal_unit]
            [filter]
                id=dionli
            [/filter]
            amount=$($damage_inflicted - 1)
            animate=no
        [/heal_unit]
        [store_locations]
            terrain=Iwr
            [not]
                x,y=$x2,$y2
                radius=2
            [/not]
            variable=valid_teleports
        [/store_locations]
        [set_variable]
            name=rand_index
            rand=0..$($valid_teleports.length - 1)
        [/set_variable]
        {TELEPORT_EFFECT_OBJECT_ID dionli} #duration=turn
        [teleport]
            [filter]
                id=dionli
            [/filter]
            x,y=$valid_teleports[$rand_index].x,$valid_teleports[$rand_index].y
            animate=yes
        [/teleport]
        {CLEAR_VARIABLE valid_teleports,rand_index}
    [/event]
    [event]
        name=defender hits
        first_time_only=no
        [filter_condition]
            {VARIABLE_CONDITIONAL phase equals 2}
        [/filter_condition]
        [filter]
            id=dionli
        [/filter]
        [heal_unit]
            [filter]
                id=dionli
            [/filter]
            amount=$($damage_inflicted - 1)
            animate=no
        [/heal_unit]
        [store_locations]
            terrain=Iwr
            [not]
                x,y=$x1,$y1
                radius=2
            [/not]
            variable=valid_teleports
        [/store_locations]
        [set_variable]
            name=rand_index
            rand=0..$($valid_teleports.length - 1)
        [/set_variable]
        {TELEPORT_EFFECT_OBJECT_ID dionli}
        [teleport]
            [filter]
                id=dionli
            [/filter]
            x,y=$valid_teleports[$rand_index].x,$valid_teleports[$rand_index].y
            animate=yes
        [/teleport]
        {CLEAR_VARIABLE valid_teleports,rand_index}
    [/event]
    [event]
        name=new turn
        first_time_only=no
        [filter_condition]
            {VARIABLE_CONDITIONAL phase equals 2}
        [/filter_condition]
        {GENERIC_UNIT 8 "Fire Guardian" 29 25}
        {GENERIC_UNIT 8 "Fire Guardian" 19 26}
        [unpetrify]
        [/unpetrify]
        [store_unit]
            variable=stored_dionli
            [filter]
                id=dionli
            [/filter]
        [/store_unit]
        {VARIABLE_OP chamber_turns add 1}
        [switch]
            variable=chamber_turns
            [case]
                value=2
                [message]
                    speaker=dionli
                    message= _ "Fire and ice, a never ending war."
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "A war you will not survive to see end, witch."
                [/message]
            [/case]
            [case]
                value=3
                [message]
                    speaker=dionli
                    message= _ "Have you never wondered why the element of ice chose you?"
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "It never did. I chose to grow this powerful, just as you chose to die fighting me."
                [/message]
            [/case]
            [case]
                value=4
                [message]
                    speaker=dionli
                    message= _ "A fraction of the power required to uphold the balance."
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "<i>I am the balance</i>. You stand no chance against me."
                [/message]
            [/case]
            [case]
                value=5
                [message]
                    speaker=dionli
                    message= _ "Untamed power, a spell for disaster. In the proper hands, an unstoppable force."
                [/message]
                [message]
                    speaker=krix
                    message= _ "The power of the Cold Heart grows as we speak. How foolish of you to believe you could contain it."
                [/message]
            [/case]
            [case]
                value=6
                [message]
                    speaker=dionli
                    message= _ "Not by myself. That is why I brought help."
                [/message]
                [message]
                    speaker=krix
                    message= _ "Do you really think your fire puppets could challenge our magic?"
                [/message]
            [/case]
            [case]
                value=7
                [message]
                    speaker=dionli
                    message= _ "That power... if only you knew the wasted potential."
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "I can't bear the cryptic prophecies of this sorceress. Face reality, you are trapped in a tomb of your own making."
                [/message]
            [/case]
            [case]
                value=8
                [message]
                    speaker=dionli
                    message= _ "Neither of you is fit to harness the power. Worry not though, I shall relieve you of your burden."
                [/message]
                [message]
                    speaker=krix
                    message= _ "One more word and I'll turn you to stone."
                [/message]
            [/case]
        [/switch]
        [if]
            {VARIABLE_CONDITIONAL stored_dionli[0].hitpoints less_than 6}
            {VARIABLE_CONDITIONAL stored_dionli[0].hitpoints greater_than 0}
            [then]
                {CLEAR_VARIABLE chamber_turns}
                {VARIABLE phase 3}
                [object]
                    silent=yes
                    duration=forever
                    [filter]
                        id=dionli
                    [/filter]
                    [effect]
                        apply_to=movement
                        set=0
                    [/effect]
                [/object]
                [modify_unit]
                    [filter]
                        id=dionli
                    [/filter]
                    moves=0
                [/modify_unit]
                [message]
                    speaker=dionli
                    message= _ "The essence of silver... my magic wanes."
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "Now is our chance. Petrify her, Krix."
                [/message]
                [objectives]
                    [objective]
                        description= _ "Petrify Dionli"
                        condition=win
                    [/objective]
                    [objective]
                        description= _ "Death of Kryz'tara or Krix"
                        condition=lose
                    [/objective]
                    [note]
                        description= _ "<b>This is the final scenario.</b>"
                    [/note]
                [/objectives]
                [event]
                    name=attacker hits
                    first_time_only=no
                    [filter_second]
                        id=dionli
                    [/filter_second]
                    [filter_attack]
                        [not]
                            special_type=petrifies
                        [/not]
                    [/filter_attack]
                    [heal_unit]
                        [filter]
                            id=dionli
                        [/filter]
                        amount=$damage_inflicted
                        animate=no
                    [/heal_unit]
                [/event]
                [event]
                    name=defender hits
                    first_time_only=no
                    [filter]
                        id=dionli
                    [/filter]
                    [filter_second_attack]
                        [not]
                            special_type=petrifies
                        [/not]
                    [/filter_second_attack]
                    [heal_unit]
                        [filter]
                            id=dionli
                        [/filter]
                        amount=$damage_inflicted
                        animate=no
                    [/heal_unit]
                [/event]
                [event]
                    name=defender hits
                    first_time_only=no
                    [filter]
                        id=dionli
                    [/filter]
                    [filter_second_attack]
                        special_type=petrifies
                    [/filter_second_attack]
                    [heal_unit]
                        [filter]
