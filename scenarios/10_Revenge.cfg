        [/kill]
        {MOVE_UNIT id=escapee5 1 31}
        [kill]
            id=escapee5
        [/kill]
        {MOVE_UNIT id=escapee6 1 31}
        [kill]
            id=escapee6
        [/kill]
        [objectives]
            [objective]
                description= _ "Kill or petrify all enemies"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara, Krix, or Grug"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]
    [event]
        name=turn 2
        [message]
            speaker=sapphire
            message= _ "You are defending a graveyard, Verlin. Do not make this take longer than it needs to."
        [/message]
        [message]
            speaker=drake_leader
            message= _ "You're a greater fool than I thought if you believe I am going down without a fight."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Then burn with your clan. It makes no difference to me."
        [/message]
    [/event]
    [event]
        name=die
        [filter]
            side=2
        [/filter]
        [message]
            speaker=sapphire
            message= _ "They shatter so easily now. Keep pushing. Do not stop until the keep is ours."
        [/message]
    [/event]
    [event]
        name=petrified
        [filter]
            [not]
                id=drake_leader
            [/not]
        [/filter]
        [message]
            speaker=drake_leader
            message= _ "What is this sorcery? You are turning my warriors to stone!"
        [/message]
        [message]
            speaker=sapphire
            message= _ "Stone or ice, it makes no difference. They shall all crumble under my reign."
        [/message]
        [message]
            speaker=drake_leader
            message= _ "Your arrogance shall cause your downfall!"
        [/message]
    [/event]
    [event]
        name=petrified
        first_time_only=no
        [filter]
            [not]
                canrecruit=yes
            [/not]
        [/filter]
        [modify_unit]
            [filter]
                id=$unit.id
            [/filter]
            side=3
        [/modify_unit]
    [/event]
    [event]
        name=last breath,petrified
        first_time_only=no
        [filter]
            side=2
        [/filter]
        [if]
            {VARIABLE_CONDITIONAL unit.id equals drake_leader}
            [then]
                [message]
                    speaker=drake_leader
                    message= _ "...I die defending the honor of the clan."
                [/message]
                [message]
                    speaker=sapphire
                    message= _ "Good riddance. Who else wants to join him?"
                [/message]
                [delay]
                    time=1000
                [/delay]
            [/then]
        [/if]
        [if]
            [have_unit]
                side=2
                [not]
                    x,y=$x1,$y1
                [/not]
                [not]
                    status=petrified
                [/not]
            [/have_unit]
            [else]
                [message]
                    speaker=sapphire
                    message= _ "This is not over. We must chase the traitor and his companions."
                [/message]
                [endlevel]
                    result=victory
                    carryover_add=yes
                    carryover_percentage=40
                    bonus=yes
                [/endlevel]
            [/else]
        [/if]
    [/event]
    [event]
        name=last breath
        [filter]
            id=sapphire
        [/filter]
        [message]
            speaker=unit
            message= _ "I finally embrace the cold of death."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
    [event]
        name=last breath
        [filter]
            id=krix,friendly_troll
        [/filter]
        [message]
            speaker=unit
            message= _ "Killed by a puny creature..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
    [event]
        name=time over
        [message]
            speaker=sapphire
            message= _ "We could not make it in time. This is hopeless."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
[/scenario]