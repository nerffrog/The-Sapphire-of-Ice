    [event]
        name=start
        [scroll_to]
            x,y=18,31
            immediate=yes
        [/scroll_to]
        [message]
            speaker=drake_leader
            message= _ "They are here. Take off, now."
        [/message]
        [message]
            speaker=vash
            message= _ "That was not our deal. You were supposed to come with us!"
        [/message]
        [message]
            speaker=drake_leader
            message= _ "I am not abandoning my duty as a guardian over the clan. Besides, I have a debt to settle with that arrogant fool."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Have you missed me, Verlin?"
        [/message]
        [message]
            speaker=drake_leader
            message= _ "You are merely walking to your death, fading one. I will thoroughly enjoy tearing apart your pathetic army."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Oh but you see, I am the fading one no more. I have a core of ice now, and it will freeze this clan to dust."
        [/message]
        [message]
            speaker=vash
            message= _ "Please Kryz, this is not right. Pull back your army and the clan shall pledge peace with you."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Kryz'tara died with his fading flame. I am Cold Heart, a winter born from his ashes. I have come here to serve justice to the scum you're trying to protect, Vash."
        [/message]
        [message]
            speaker=sapphire
            message= _ "Your betrayal will not go unpunished either. Attack, my warriors! Spare no drake!"
        [/message]
        [message]
            speaker=krix
            message= _ "They brought this upon themselves. You heard the Cold Heart, strike down the enemy!"
        [/message]
        [message]
            speaker=drake_leader
            message= _ "So be it. Fly away, Vash. You know what to do."
        [/message]
        [message]
            speaker=vash
            message= _ "...Your sacrifice shall be honored by generations to come. Good luck, my warden."
        [/message]
        {UNIT 2 "Drake Burner" 13 32 id=escapee1}
        {UNIT 2 "Fire Drake" 13 32 id=escapee2}
        {UNIT 2 "Sky Drake" 13 32 id=escapee3}
        {UNIT 2 "Fire Drake" 13 32 id=escapee4}
        {UNIT 2 "Hurricane Drake" 13 32 id=escapee5}
        {UNIT 2 "Drake Burner" 13 32 id=escapee6}
        {MOVE_UNIT id=vash 1 31}
        [store_unit]
            variable=stored_vash
            [filter]
                id=vash
            [/filter]
            kill=yes
        [/store_unit]
        {MOVE_UNIT id=escapee1 1 31}
        [kill]
            id=escapee1
        [/kill]
        {MOVE_UNIT id=escapee2 1 31}
        [kill]
