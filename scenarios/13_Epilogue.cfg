[scenario]
    id=13_Epilogue
    next_scenario=null
    name= _ "Epilogue"
    map_data="{~add-ons/The_Sapphire_of_Ice/maps/13a_Epilogue.map}"
    {DEFAULT_SCHEDULE}
    turns=-1
    theme=Cutscene
    [side]
        side=1
        controller=human
        fog=no
        shroud=no
        hidden=yes
    [/side]
    [event]
        name=start
        {VARIABLE stored_vash[0].side 1}
        {VARIABLE stored_vash[0].x 25}
        {VARIABLE stored_vash[0].y 9}
        [unstore_unit]
            variable=stored_vash
        [/unstore_unit]
        {CLEAR_VARIABLE stored_vash}
        {GENERIC_UNIT 1 "Drake Glider" 25 9}
        {GENERIC_UNIT 1 "Drake Glider" 25 9}
        {GENERIC_UNIT 1 "Drake Glider" 25 9}
        {GENERIC_UNIT 1 "Drake Burner" 25 9}
        {GENERIC_UNIT 1 "Drake Fighter" 25 9}
        {GENERIC_UNIT 1 "Drake Warrior" 25 9}
        [message]
            speaker=vash
            message= _ "Evil has been destroyed, fellow drakes. We must honor our part of the deal and leave the forests now."
        [/message]
        [message]
            speaker=vash
            message= _ "Spread your wings. Our hunt has just begun!"
        [/message]
        [store_unit]
            variable=stored_drakes
            [filter]
                side=1
            [/filter]
        [/store_unit]
        [foreach]
            array=stored_drakes
            variable=current_unit
            [do]
                [move_unit]
                    id=$current_unit.id
                    to_x,to_y=3,5
                [/move_unit]
                [kill]
                    id=$current_unit.id
                    animate=no
                [/kill]
                [delay]
                    time=200
                [/delay]
            [/do]
        [/foreach]
        {CLEAR_VARIABLE stored_drakes}
        {FADE_TO_BLACK}
        [replace_map]
            map="{~add-ons/The_Sapphire_of_Ice/maps/13b_Epilogue.map}"
            expand=yes
            shrink=yes
        [/replace_map]
        {VARIABLE stored_krix[0].x 18}
        {VARIABLE stored_krix[0].y 1}
        [unstore_unit]
            variable=stored_krix
        [/unstore_unit]
        {CLEAR_VARIABLE stored_krix}
        [delay]
            time=500
        [/delay]
        {FADE_IN}
        [message]
            speaker=krix
            message= _ "I must find a new home. My staff may be gone, but I must not be deterred."
        [/message]
        {MOVE_UNIT id=krix 19 6}
        [delay]
            time=100
        [/delay]
        [kill]
            id=krix
            animate=no
        [/kill]
        {FADE_TO_BLACK}
        [replace_map]
            map="{~add-ons/The_Sapphire_of_Ice/maps/13c_Epilogue.map}"
            expand=yes
            shrink=yes
        [/replace_map]
        [redraw]
        [/redraw]
        [unit]
            side=1
            id=salennea
            type=Elvish Lady
            name= _ "Salennea"
            x,y=12,7
        [/unit]
        [item]
            image="items/ball-blue.png"
            x,y=9,5
        [/item]
        [delay]
            time=500
        [/delay]
        {FADE_IN}
        [message]
            speaker=salennea
            message= _ "This gem is very interesting. Surely, my sister would not mind me taking a look."
        [/message]
        {MOVE_UNIT id=salennea 10 5}
        [delay]
            time=400
        [/delay]
        [kill]
            id=salennea
            animate=no
        [/kill]
        [endlevel]
            result=victory
            carryover_report=no
            linger_mode=no
            save=no
            end_credits=yes
        [/endlevel]
    [/event]
[/scenario]