                [/kill]
                [modify_unit]
                    [filter]
                        id=krix
                    [/filter]
                    canrecruit=yes
                [/modify_unit]
                [disallow_recruit]
                    side=1
                    type="Saurian Skirmisher, Saurian Augur, Drake Glider, Troll Whelp"
                [/disallow_recruit]
                [modify_side]
                    side=1
                    income=-2
                [/modify_side]
                [object]
                    silent=yes
                    duration=scenario
                    [filter]
                        id=krix
                    [/filter]
