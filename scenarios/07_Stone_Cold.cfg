#textdomain wesnoth-The_Sapphire_of_Ice
[scenario]
    id=07_Stone_Cold
    next_scenario=08_The_Hammer
    name= _ "Stone Cold"
    map_data="{~add-ons/The_Sapphire_of_Ice/maps/07_Stone_Cold.map}"
    {UNDERGROUND}
    {TURNS 11 10 9}
    victory_when_enemies_defeated=no
#define RECALL_OR_SPAWN_SQUAD X Y
    [store_unit]
        [filter]
            side=1
            race=troll
            level=3
            x,y=recall,recall
        [/filter]
        variable=troll_pool
    [/store_unit]
    [store_unit]
        [filter]
            side=1
            race=troll
            level=2
            x,y=recall,recall
        [/filter]
        variable=troll_pool
        mode=append
    [/store_unit]
    [store_unit]
        [filter]
            side=1
            race=troll
            level=1
            x,y=recall,recall
        [/filter]
        variable=troll_pool
        mode=append
    [/store_unit]
    [repeat]
        times=2
        [do]
            [if]
                {VARIABLE_CONDITIONAL troll_pool.length greater_than 0}
                [then]
                    [recall]
                        id=$troll_pool[0].id
                        x,y={X},{Y}
                    [/recall]
                    {CLEAR_VARIABLE troll_pool[0]}
                [/then]
                [else]
                    [unit]
                        side=1
                        type=Troll Whelp
                        x,y={X},{Y}
                    [/unit]
                [/else]
            [/if]
        [/do]
    [/repeat]
    {CLEAR_VARIABLE troll_pool}
    [store_unit]
        [filter]
            side=1
            race=lizard
            level=3
            x,y=recall,recall
        [/filter]
        variable=saurian_pool
    [/store_unit]
    [store_unit]
        [filter]
            side=1
            race=lizard
            level=2
            x,y=recall,recall
        [/filter]
        variable=saurian_pool
        mode=append
    [/store_unit]
    [store_unit]
        [filter]
            side=1
            race=lizard
            level=1
            x,y=recall,recall
        [/filter]
        variable=saurian_pool
        mode=append
    [/store_unit]
    [repeat]
        times=4
        [do]
            [if]
                {VARIABLE_CONDITIONAL saurian_pool.length greater_than 0}
                [then]
                    [recall]
                        id=$saurian_pool[0].id
                        x,y={X},{Y}
                    [/recall]
                    {CLEAR_VARIABLE saurian_pool[0]}
                [/then]
                [else]
                    [unit]
                        side=1
                        type=Saurian Skirmisher
                        x,y={X},{Y}
                    [/unit]
                [/else]
            [/if]
        [/do]
    [/repeat]
    {CLEAR_VARIABLE saurian_pool}
#enddef
    [side]
        side=1
        controller=human
        team_name="good"
        user_team_name= _ "Drakes"
        id=sapphire
        name= _ "Kryz'tara"
        type="Glacial Drake"
        unrenameable=yes
        canrecruit=yes
        gold=0
        income=16
        recruit="Saurian Skirmisher, Saurian Augur, Drake Glider, Troll Whelp"
        shroud=yes
    [/side]
    [side]
        side=2
        controller=ai
        team_name="bad"
        user_team_name= _ "Elementals"
        no_leader=yes
        gold=0
        hidden=yes
        [ai]
            aggression=0.99
            caution=0.0
            grouping=no
        [/ai]
    [/side]
    [event]
        name=prestart
        [recall]
            id=krix
        [/recall]
        [recall]
            id=vash
        [/recall]
        [recall]
            id=friendly_troll
        [/recall]
        {RECALL_OR_SPAWN_SQUAD 6 43}
    [/event]
    [event]
        name=start
        [message]
            speaker=sapphire
            message= _ "The spirits are still chasing us. We must find a way to seal the lake."
        [/message]
        [message]
            speaker=vash
            message= _ "Krix has control over the stone element, doesn't he? The entrance is narrow, why not raise a stone wall to block it?"
        [/message]
        [message]
            speaker=krix
            message= _ "Why not make a wish instead? It is not that simple..."
        [/message]
        [message]
            speaker=krix
            message= _ "This gives me an idea though. If I infuse the element of stone with the inner flame of those spirits, I may be able to morph them into large stones instead of statues."
        [/message]
        [message]
            speaker=friendly_troll
            message= _ "(Sighs) Do what you must do, at least it would neutralize the lake's inhabitants for some time."
        [/message]
        [message]
            speaker=vash
            message= _ "Is there no other way, Kryz? Our troll friends are clearly distraught by our handling of the situation."
        [/message]
        [message]
            speaker=sapphire
            message= _ "And what do you want me to do? Our safety must be guaranteed by any means necessary."
        [/message]
        [message]
            speaker=vash
            message= _ "I am finding these solutions harder and harder to justify."
        [/message]
        [message]
            speaker=krix
            message= _ "But betraying your clan is justifiable? Focus, Vash. You spare your enemies, but they will not spare you."
        [/message]
        [objectives]
            [objective]
                description= _ "Seal the lake (petrify a unit on each highlighted hex)"
                condition="win"
            [/objective]
            [objective]
                description= _ "Death of Kryz'tara, Vash, Krix, or Grug"
                condition="lose"
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition="lose"
            [/objective]
            [note]
                description= _ "Any unit petrified will turn into an impassable wall"
            [/note]
        [/objectives]
        {PLACE_IMAGE "items/gohere.png" 9 42}
        {PLACE_IMAGE "items/gohere.png" 9 43}
        {PLACE_IMAGE "items/gohere.png" 8 43}
        {PLACE_IMAGE "items/gohere.png" 8 44}
    [/event]
