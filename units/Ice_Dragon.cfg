#textdomain wesnoth-The_Sapphire_of_Ice
[unit_type]
    id=Ice Dragon
    name= _ "Ice Dragon"
    race=monster
    image="units/drakes/ice-dragon.png"
    profile="portraits/drakes/ice-dragon.webp"
    hitpoints=124
    movement_type=drakefly
    movement=6
    experience=200
    level=5
    alignment=chaotic
    advances_to=null
    {AMLA_DEFAULT}
    cost=100
    usage=archer
    description= _ "The Ice Dragon is a living calamity of frost, its scales forged from jagged, impenetrable ice. Its roar summons blinding blizzards, and its breath entombs entire battalions in eternal winter. To stand beside such a mythical predator inspires a terrifying zeal, driving its allies to strike with unprecedented ferocity."
    die_sound=drake-die.ogg
    [resistance]
        cold=0
        impact=80
        fire=150
        pierce=110
        blade=90
    [/resistance]
    [defense]
        frozen=50
    [/defense]
    [movement_costs]
        frozen=1
        cave=2
    [/movement_costs]
    [abilities]
        {ABILITY_LEADERSHIP}
        [freezing_aura]
            id=freezing aura
            name= _ "freezing aura"
            description= _ "All adjacent hexes will be turned to ice at the beginning of the turn."
        [/freezing_aura]
    [/abilities]
    {FREEZE_ADJACENT}
    [attack]
        name=bite
        description= _"bite"
        icon=attacks/fangs-animal.png
        type=blade
        range=melee
        damage=19
        number=3
    [/attack]
    [attack]
        name=icy breath
        description= _"icy breath"
        icon=attacks/ice-breath-dragon.png
        type=cold
        [specials]
            {WEAPON_SPECIAL_MARKSMAN}
            {WEAPON_SPECIAL_SLOW}
            {WEAPON_SPECIAL_DRAIN}
        [/specials]
        range=ranged
        damage=15
        number=6
    [/attack]
    [movement_anim]
        start_time=0
        submerge=0.01
        [frame]
            duration=500
            image="units/drakes/ice-dragon-fly.png"
        [/frame]
        [frame]
            duration=500
            image="units/drakes/ice-dragon.png"
        [/frame]
    [/movement_anim]
    [attack_anim]
        [filter_attack]
            name=icy breath
        [/filter_attack]
        start_time=-300
        {MISSILE_FRAME_ICE_BEAM}

        [frame]
            begin=-500
            end=-450
            image="units/drakes/ice-dragon.png"
        [/frame]
        [frame]
            begin=-450
            end=-400
            image="units/drakes/ice-dragon-breath.png"
        [/frame]

        [if]
            hits=no

            [frame]
                begin=-400
                end=-250
                image="units/drakes/ice-dragon-breath.png"
                sound=magic-dark.ogg
            [/frame]
        [/if]
        [else]
            hits=yes

            [frame]
                begin=-400
                end=-250
                image="units/drakes/ice-dragon-breath.png"
                sound=magic-dark-miss.ogg
            [/frame]
        [/else]
        [frame]
            begin=-250
            end=-50
            image="units/drakes/ice-dragon-breath.png"
        [/frame]
        [frame]
            begin=-50
            end=100
            image="units/drakes/ice-dragon.png"
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=bite
        [/filter_attack]
        [frame]
            begin=-500
            end=-450
            image="units/drakes/ice-dragon.png"
        [/frame]
        [frame]
            begin=-450
            end=-300
            image="units/drakes/ice-dragon-breath.png"
        [/frame]
        [if]
            hits=no
            direction=s,se,sw
            [frame]
                begin=-300
                end=50
                image="units/drakes/ice-dragon-fangs.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/if]
        [else]
            hits=yes
            direction=s,se,sw
            [frame]
                begin=-300
                end=50
                image="units/drakes/ice-dragon-fangs.png"
                sound=bite.ogg
            [/frame]
        [/else]
        [else]
            hits=yes
            direction=n,ne,nw
            [frame]
                begin=-300
                end=50
                image="units/drakes/ice-dragon-fangs-n.png"
                sound=bite.ogg
            [/frame]
        [/else]
        [else]
            hits=no
            direction=n,ne,nw
            [frame]
                begin=-300
                end=50
                image="units/drakes/ice-dragon-fangs-n.png"
            [/frame]
        [/else]
        [frame]
            begin=-50
            end=450
            image="units/drakes/ice-dragon-breath.png"
        [/frame]
        [frame]
            begin=450
            end=500
            image="units/drakes/ice-dragon.png"
        [/frame]
    [/attack_anim]
[/unit_type]
