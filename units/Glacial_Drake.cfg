#textdomain wesnoth-The_Sapphire_of_Ice
[unit_type]
    id=Glacial Drake
    name= _ "Glacial Drake"
    race=drake
    gender=male,female
    image="units/drakes/glacial.png"
    profile="portraits/drakes/glacial.webp"
    hitpoints=45
    movement_type=drakefly
    movement=5
    experience=43
    level=1
    alignment=chaotic
    advances_to=Frost Drake
    cost=21
    usage=archer
    description= _ "Drakes are children of the internal fire; it is the source of their strength and their leadership. This drake, however, is a living testament to a rare and agonizing survival. 

Born as a standard burner, his internal flame began to sputter and fade during his first molt. Instead of perishing from the cold of the high peaks as a weakling should, his body underwent a desperate, elemental inversion. The heat did not just leave him; it was replaced by the biting chill of the mountain stone he slept upon. His scales, once ruddy and warm, have bleached into the pale blue of deep ice. He is a survivor of a fever that broke the wrong way, leaving him with a heart of frost and breath that does not burn, but shatters."
    die_sound=drake-die.ogg
    {DEFENSE_ANIM "units/drakes/glacial-defend-2.png" "units/drakes/glacial-defend-1.png" {SOUND_LIST:DRAKE_HIT} }
    {DRAKE_STANDING_ANIM glacial}
    {DRAKE_MOVEMENT_ANIM glacial}
    {DRAKE_WEAPON_ANIM glacial}
    [resistance]
        cold=30
        fire=140
    [/resistance]
    [movement_costs]
        cave=2
        frozen=1
    [/movement_costs]
    [defense]
        frozen=60
    [/defense]
    [attack]
        name=claws
        description=_"claws"
        icon=attacks/claws-drake.png
        type=blade
        range=melee
        damage=7
        number=2
    [/attack]
    [attack]
        name=ice breath
        description=_"ice breath"
        icon=attacks/ice-breath-dragon.png
        type=cold
        range=ranged
        [specials]
            {WEAPON_SPECIAL_SLOW}
        [/specials]    
        damage=8
        number=4
    [/attack]
    {DRAKE_ICE_ANIM_S_DIAGONAL glacial 35,40}   
    {DRAKE_ICE_ANIM_N_DIAGONAL_CURRENT glacial 35,-20}
    {DRAKE_ICE_ANIM_S glacial 8,50}
    {DRAKE_ICE_ANIM_N_CURRENT glacial 8,-50} 
    [attack_anim]
        [filter_attack]
            name=claws
        [/filter_attack]
        offset=0.0~0.2,0.2~0.7,0.7~0.2,0.2~0.0
        start_time=-300
        [frame]
            image="units/drakes/glacial.png"
        [/frame]
        [frame]
            image="units/drakes/glacial-melee-[1~6].png:100"
        [/frame]
        {SOUND:HIT_AND_MISS claws.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/drakes/glacial.png"
        [/frame]
    [/attack_anim]
    [female]
        name= _ "female^Drake glacial"
        gender=female
    [/female]
[/unit_type]
