#textdomain wesnoth-The_Sapphire_of_Ice
[unit_type]
    id=Fading Drake
    name= _ "Fading Drake"
    race=drake
    gender=male,female
    image="units/drakes/burner.png"
    profile="portraits/drakes/burner.webp"
    hitpoints=42
    movement_type=drakefly
    movement=5
    experience=34
    level=1
    alignment=neutral
    advances_to=null
    cost=21
    usage=archer
    description= _ "Drake Burners are the proud few in whom the blood and strength of their remote ancestors runs truest, giving them the ability to breathe fire. For unknown reasons, some are born with a dim fire and unnatural affinity for cold; they are outcasts among their clans, and many of them face execution to preserve the pure bloodline."
    die_sound=drake-die.ogg
    {DEFENSE_ANIM "units/drakes/burner-defend-2.png" "units/drakes/burner-defend-1.png" {SOUND_LIST:DRAKE_HIT} }
    {DRAKE_STANDING_ANIM burner}
    {DRAKE_MOVEMENT_ANIM burner}
    {DRAKE_WEAPON_ANIM burner}
    [resistance]
        cold=80
        fire=80
    [/resistance]
    [attack]
        name=claws
        description=_"claws"
        icon=attacks/claws-drake.png
        type=blade
        range=melee
        damage=7
        number=2
    [/attack]
    [attack]
        name=fire breath
        description=_"fire breath"
        icon=attacks/fire-breath-drake.png
        type=fire
        range=ranged
        damage=6
        number=2
    [/attack]
    {DRAKE_FIRE_ANIM_S_DIAGONAL burner 35,40}
    {DRAKE_FIRE_ANIM_N_DIAGONAL_CURRENT burner 35,-20}
    {DRAKE_FIRE_ANIM_S burner 8,50}
    {DRAKE_FIRE_ANIM_N_CURRENT burner 8,-50}
    [attack_anim]
        [filter_attack]
            name=claws
        [/filter_attack]
        offset=0.0~0.2,0.2~0.7,0.7~0.2,0.2~0.0
        start_time=-300
        [frame]
            image="units/drakes/burner.png"
        [/frame]
        [frame]
            image="units/drakes/burner-melee-[1~6].png:100"
        [/frame]
        {SOUND:HIT_AND_MISS claws.ogg {SOUND_LIST:MISS} -100}
        [frame]
            image="units/drakes/burner.png"
        [/frame]
    [/attack_anim]
    [female]
        name= _ "female^Drake Burner"
        gender=female
    [/female]
[/unit_type]
